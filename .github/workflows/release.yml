name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Push gems to rubygems.org (only on workflow_dispatch)"
        required: false
        default: "false"

jobs:
  # --- macOS native builds -------------------------------------------------
  build-darwin:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, platform: arm64-darwin }
          # x86_64-darwin (Intel Mac) intentionally omitted from 0.1.0 —
          # GitHub's macos-13 runner queue is essentially permanently
          # saturated (jobs sit for hours), and Intel Macs are a shrinking
          # minority post-Apple-Silicon. Users on Intel Macs can install
          # via the source gem after `brew install teammilestone/tap/libcurl-impersonate`.
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Download libcurl-impersonate for ${{ matrix.platform }}
        run: bundle exec rake "vendor:${{ matrix.platform }}"

      - name: Build native gem
        env:
          RAKE_EXTENSION_PLATFORM: ${{ matrix.platform }}
        run: bundle exec rake native:${{ matrix.platform }}

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/curl_impersonate-*-${{ matrix.platform }}.gem
          if-no-files-found: error

  # --- Linux cross-compiled builds via rake-compiler-dock -------------------
  build-linux:
    name: build (${{ matrix.platform }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - x86_64-linux-gnu
          # aarch64-linux-gnu intentionally omitted from 0.1.0 — requires the
          # rake-compiler-dock cross-Ruby for ARM64 which has its own setup
          # quirks under QEMU. Users on Graviton/Pi can install via the source
          # gem (their gcc will be aarch64 natively).
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Download libcurl-impersonate for ${{ matrix.platform }}
        run: bundle exec rake "vendor:${{ matrix.platform }}"

      - name: Cross-compile native gem
        # rake-compiler-dock's CLI has no --platform option; the target image
        # is selected via the RCD_PLATFORM env var. The dock's cross-Ruby and
        # bundler live inside the image but are only put on $PATH by the
        # /etc/rubybashrc that a login bash sources — using `sh -c` bypasses
        # that and produces "bundle: not found". Use `bash --login -c` so
        # the cross-Ruby for RUBY_CC_VERSION is activated.
        #
        # We point extconf.rb at the vendored libcurl-impersonate with an
        # explicit CURL_IMPERSONATE_DIR rather than relying on vendor/<plat>
        # auto-detection, because the cross-Ruby's RUBY_PLATFORM inside the
        # dock does not necessarily match the rubygems platform tag exactly.
        env:
          RCD_PLATFORM: ${{ matrix.platform }}
          RUBY_CC_VERSION: "3.4.0:3.3.0:3.2.0:3.1.0:3.0.0"
        run: |
          bundle exec rake-compiler-dock bash --login -c "
            set -ex
            export CURL_IMPERSONATE_DIR=\"\$PWD/ext/curl_impersonate/vendor/${{ matrix.platform }}\"
            bundle install
            bundle exec rake native:${{ matrix.platform }}
          "

      - uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.platform }}
          path: pkg/curl_impersonate-*-${{ matrix.platform }}.gem
          if-no-files-found: error

  # --- Source gem ----------------------------------------------------------
  build-source:
    name: build (source)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rake build
      - uses: actions/upload-artifact@v4
        with:
          name: gem-source
          path: pkg/curl_impersonate-*.gem
          if-no-files-found: error

  # --- Combined release ----------------------------------------------------
  release:
    name: publish release
    needs: [build-darwin, build-linux, build-source]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: gems
          merge-multiple: true

      - name: List gems
        run: ls -la gems/

      - name: Create GitHub Release with all gems attached
        uses: softprops/action-gh-release@v2
        with:
          files: gems/*.gem
          generate_release_notes: true

      # Pushing to rubygems.org is opt-in: only triggered when the workflow is
      # dispatched manually with publish=true. Tag pushes upload to GitHub
      # Release only — give us a chance to inspect before publishing.
      - name: Publish to RubyGems
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true'
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          printf -- "---\n:rubygems_api_key: %s\n" "${GEM_HOST_API_KEY}" > ~/.gem/credentials
          chmod 0600 ~/.gem/credentials
          for gem in gems/*.gem; do
            echo "Publishing ${gem}"
            gem push "${gem}"
          done
